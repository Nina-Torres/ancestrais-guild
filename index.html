<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Ancestrais — Controle de Slots</title>
<link rel="icon" href="data:,">
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    min-height: 100vh;
    background: radial-gradient(circle at 50% -10%, #0F1B33 0%, #070B15 45%, #030509 100%);
    color: #EAF0F8;
    font-family: 'Georgia', 'Segoe UI', serif;
    padding: 20px 16px 60px;
  }
  input, select, button, textarea { font-family: 'Segoe UI', sans-serif; }
  button { cursor: pointer; }
  ::placeholder { color: #5A6A85; }
  @keyframes moonGlow { 0%,100%{opacity:.6; filter:brightness(1)} 50%{opacity:1; filter:brightness(1.15)} }
  @keyframes alertPulse { 0%,100%{box-shadow:0 0 0 0 rgba(232,146,154,0.0)} 50%{box-shadow:0 0 0 4px rgba(232,146,154,0.12)} }
  .header { display: flex; align-items: center; gap: 12px; max-width: 480px; margin: 0 auto; justify-content: space-between; }
  .header-left { display: flex; align-items: center; gap: 12px; }
  .badge {
    width: 44px; height: 44px; border-radius: 50%;
    background: radial-gradient(circle, #BFE0FF 0%, #4F86C6 55%, #14243B 100%);
    display: flex; align-items: center; justify-content: center;
    box-shadow: 0 0 0 1px rgba(191,224,255,0.25), 0 0 22px rgba(127,184,232,0.45);
    animation: moonGlow 4s ease-in-out infinite;
    flex-shrink: 0;
  }
  .title { font-size: 21px; font-weight: 700; letter-spacing: 2px; text-transform: uppercase; color: #F2F6FC; }
  .subtitle { font-size: 12px; color: #7C8AA3; letter-spacing: 0.4px; }
  .gear-btn { background: rgba(127,184,232,0.08); border: 1px solid rgba(127,184,232,0.25); color: #BFE0FF; border-radius: 10px; padding: 8px 10px; font-size: 16px; }
  .divider { height: 1px; max-width: 480px; margin: 14px auto 2px; background: linear-gradient(90deg, transparent, rgba(127,184,232,0.4), transparent); }
  .wrap { max-width: 480px; margin: 0 auto; }
  .banner {
    width: 100%; margin-top: 14px; padding: 10px 14px; border-radius: 10px;
    background: rgba(127,184,232,0.10); border: 1px solid rgba(127,184,232,0.3);
    color: #BFE0FF; font-size: 13px; display: flex; align-items: center; gap: 8px; text-align: left;
  }
  .banner.ok { background: rgba(111,209,197,0.08); border-color: rgba(111,209,197,0.25); color: #B7E8E0; }
  .banner.warn { background: rgba(224,190,110,0.10); border-color: rgba(224,190,110,0.35); color: #E8CE92; }
  .alert-box {
    width: 100%; margin-top: 14px; padding: 12px 14px; border-radius: 12px;
    background: rgba(232,146,154,0.10); border: 1px solid rgba(232,146,154,0.4);
    animation: alertPulse 2.5s ease-in-out infinite;
  }
  .alert-title { font-size: 12.5px; font-weight: 700; color: #E8929A; display: flex; align-items: center; gap: 6px; margin-bottom: 8px; letter-spacing: 0.3px; }
  .alert-item { font-size: 13px; color: #F2F6FC; display: flex; justify-content: space-between; padding: 4px 0; border-top: 1px solid rgba(232,146,154,0.15); }
  .alert-item:first-child { border-top: none; }
  .alert-item .d { color: #E8929A; font-weight: 600; font-size: 12px; }
  .gold-card {
    margin-top: 18px; border-radius: 14px; padding: 14px 16px;
    background: linear-gradient(135deg, rgba(127,184,232,0.12), rgba(15,27,51,0.4));
    border: 1px solid rgba(127,184,232,0.25);
    display: flex; align-items: center; justify-content: space-between;
  }
  .pix-card {
    background: linear-gradient(135deg, rgba(111,209,197,0.12), rgba(15,27,51,0.4));
    border: 1px solid rgba(111,209,197,0.28);
  }
  .gold-label { font-size: 11px; color: #7C8AA3; letter-spacing: 0.3px; }
  .gold-value { font-size: 19px; font-weight: 700; color: #F2F6FC; }
  .mini-stats { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-top: 10px; }
  .mini-stats-2 { grid-template-columns: repeat(2, 1fr); }
  .mini-stat {
    border-radius: 12px; padding: 10px 8px; text-align: center;
    background: rgba(127,184,232,0.06); border: 1px solid rgba(127,184,232,0.18);
  }
  .mini-stat .num { font-size: 16px; font-weight: 700; color: #F2F6FC; }
  .mini-stat .lbl { font-size: 10px; color: #7C8AA3; margin-top: 2px; line-height: 1.3; }
  .pagantes-chip {
    margin-top: 14px; text-align: center; font-size: 12px; color: #BFE0FF;
    background: rgba(127,184,232,0.06); border: 1px solid rgba(127,184,232,0.15);
    border-radius: 10px; padding: 8px;
  }
  .pagantes-chip span { color: #7C8AA3; font-size: 11px; }
  .stats { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-top: 12px; }
  .stat { border-radius: 12px; padding: 10px 8px; text-align: center; border: 1px solid; }
  .stat .num { font-size: 20px; font-weight: 700; }
  .stat .lbl { font-size: 11px; color: #7C8AA3; margin-top: 2px; }
  .clickable-stat { width: 100%; transition: transform .1s ease; }
  .clickable-stat:active { transform: scale(0.96); }
  .stat-selected { box-shadow: 0 0 0 2px currentColor inset; }
  .filter-chip {
    margin-top: 10px; font-size: 12px; color: #9DC3EA; display: flex; align-items: center; gap: 8px;
  }
  .filter-chip button { background: none; border: none; color: #7C8AA3; font-size: 11.5px; text-decoration: underline; }

  .chart-card {
    margin-top: 14px; border-radius: 14px; padding: 14px 16px;
    background: rgba(127,184,232,0.05); border: 1px solid rgba(127,184,232,0.18);
  }
  .chart-title { font-size: 12px; color: #9DC3EA; font-weight: 700; margin-bottom: 10px; letter-spacing: 0.3px; }
  .chart-row { display: flex; align-items: center; gap: 8px; margin-bottom: 7px; }
  .chart-month { font-size: 11px; color: #7C8AA3; width: 42px; flex-shrink: 0; }
  .chart-bar-wrap { flex: 1; background: rgba(255,255,255,0.04); border-radius: 6px; overflow: hidden; height: 16px; }
  .chart-bar { height: 100%; background: linear-gradient(90deg, #2E5C8A, #7FB8E8); border-radius: 6px; min-width: 2px; }
  .chart-bar-pix { background: linear-gradient(90deg, #1F9E5A, #6FD1C5); }
  .chart-value { font-size: 11px; color: #F2F6FC; width: 64px; text-align: right; flex-shrink: 0; }

  .tabs { display: flex; gap: 8px; margin-top: 16px; }
  .tab-btn {
    flex: 1; padding: 10px; border-radius: 10px; border: 1px solid rgba(127,184,232,0.25);
    background: transparent; color: #7C8AA3; font-weight: 600; font-size: 13px;
  }
  .tab-btn.active { background: rgba(127,184,232,0.15); color: #F2F6FC; border-color: rgba(127,184,232,0.5); }

  .btn-row { display: flex; gap: 8px; margin-top: 14px; }
  .add-btn {
    flex: 1; padding: 13px; border-radius: 12px; border: none;
    background: linear-gradient(135deg, #2E5C8A, #7FB8E8); color: #08111F; font-weight: 700; font-size: 14.5px;
    display: flex; align-items: center; justify-content: center; gap: 8px;
    box-shadow: 0 6px 18px rgba(127,184,232,0.25);
  }
  .pdf-btn {
    flex: 1; padding: 13px; border-radius: 12px; border: 1px solid rgba(127,184,232,0.4);
    background: rgba(127,184,232,0.08); color: #BFE0FF; font-weight: 700; font-size: 14.5px;
    display: flex; align-items: center; justify-content: center; gap: 8px;
  }
  .overlay {
    position: fixed; inset: 0; background: rgba(3,5,9,0.82);
    display: none; align-items: flex-end; justify-content: center; z-index: 50;
    backdrop-filter: blur(3px);
  }
  .overlay.open { display: flex; }
  .modal {
    width: 100%; max-width: 480px; background: #0C1526;
    border-radius: 20px 20px 0 0; padding: 20px; max-height: 90vh; overflow-y: auto;
    border: 1px solid rgba(127,184,232,0.28); border-bottom: none;
  }
  .modal-head { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; }
  .modal-head .t { font-size: 16px; font-weight: 700; color: #F2F6FC; }
  .modal-head button { background: none; border: none; color: #7C8AA3; font-size: 20px; }
  label { font-size: 12px; color: #7C8AA3; display: block; margin-bottom: 6px; }
  .field { width: 100%; padding: 11px 12px; border-radius: 10px; margin-bottom: 14px; background: #070D18; border: 1px solid #223350; color: #EAF0F8; font-size: 14px; }
  textarea.field { resize: vertical; min-height: 60px; }
  .row2 { display: flex; gap: 10px; }
  .row2 > div { flex: 1; }
  .hint { font-size: 12px; color: #5A6A85; margin-bottom: 14px; }
  .err { color: #E8929A; font-size: 12.5px; margin-bottom: 12px; }
  .save-btn { width: 100%; padding: 13px; border-radius: 12px; border: none; background: linear-gradient(135deg, #2E5C8A, #7FB8E8); color: #08111F; font-weight: 700; font-size: 14.5px; }
  .empty { text-align: center; color: #5A6A85; font-size: 13.5px; margin-top: 40px; }
  .list { margin-top: 22px; }
  .card {
    background: #0A1220; border: 1px solid; border-radius: 14px; padding: 13px 14px; margin-bottom: 10px;
  }
  .card-top { display: flex; justify-content: space-between; align-items: center; }
  .name-row { display: flex; align-items: center; gap: 8px; margin-bottom: 4px; flex-wrap: wrap; }
  .p-name { font-size: 15px; font-weight: 600; color: #F2F6FC; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; max-width: 150px; }
  .p-badge { font-size: 10.5px; font-weight: 700; padding: 2px 8px; border-radius: 20px; border: 1px solid; display: inline-flex; align-items: center; gap: 4px; }
  .meta-row { font-size: 12px; color: #7C8AA3; display: flex; gap: 12px; flex-wrap: wrap; }
  .exit-line { font-size: 12.5px; margin-top: 2px; font-weight: 600; }
  .obs-line { font-size: 12px; color: #8E97AC; margin-top: 5px; font-style: italic; }
  .card-actions { display: flex; gap: 4px; flex-shrink: 0; }
  .icon-btn { background: none; border: none; color: #7C8AA3; padding: 6px; font-size: 15px; border-radius: 8px; }
  .icon-btn:active { background: rgba(127,184,232,0.1); }
  .loading { text-align: center; color: #5A6A85; font-size: 13px; margin-top: 40px; }
</style>
</head>
<body>

  <div class="header">
    <div class="header-left">
      <div class="badge">🌙</div>
      <div>
        <div class="title">Ancestrais</div>
        <div class="subtitle">Registro dos slots da guilda</div>
      </div>
    </div>
    <button class="gear-btn" id="openConfig">⚙️</button>
  </div>
  <div class="divider"></div>

  <div class="wrap" id="app">
    <div class="loading">Carregando dados da guilda...</div>
  </div>

<script type="module">
  // ==========================================================
  // 1) COLE AQUI SUA firebaseConfig (copiada do console do Firebase)
  // ==========================================================
  const firebaseConfig = {
    apiKey: "AIzaSyBW_74559tSXzJ9d4sSjq_EqdlYRtg2ABs",
    authDomain: "ancestrais-guild.firebaseapp.com",
    projectId: "ancestrais-guild",
    storageBucket: "ancestrais-guild.firebasestorage.app",
    messagingSenderId: "106734993125",
    appId: "1:106734993125:web:96aa499c1ba11db44cde0c"
  };
  // ==========================================================

  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
  import {
    getFirestore, collection, onSnapshot, addDoc, deleteDoc, doc, updateDoc, setDoc, getDoc
  } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);
  const playersCol = collection(db, "players");
  const configRef = doc(db, "config", "settings");

  const DAY = 24 * 60 * 60 * 1000;
  const DEFAULT_PRICE = 35000;
  const DEFAULT_DURATION = 30;
  const DEFAULT_PIX_PRICE = 3.50;

  const toDateInput = (d) => new Date(d).toISOString().slice(0, 10);
  const addDays = (dateStr, days) => {
    const d = new Date(dateStr + 'T00:00:00');
    d.setDate(d.getDate() + Number(days));
    return toDateInput(d);
  };
  const daysUntil = (dateStr) => {
    const today = new Date(); today.setHours(0,0,0,0);
    const target = new Date(dateStr + 'T00:00:00');
    return Math.round((target - today) / DAY);
  };
  let alertDays = 5; // padrão; substituído pelo valor salvo em Configurações
  const statusOf = (dateStr) => {
    const d = daysUntil(dateStr);
    if (d < 0) return 'expired';
    if (d <= alertDays) return 'soon';
    return 'active';
  };
  const fmtGold = (n) => (Number(n) || 0).toLocaleString('pt-BR');
  const fmtBRL = (n) => 'R$ ' + (Number(n) || 0).toLocaleString('pt-BR', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
  const isPix = (p) => p.pagamento === 'pix';
  const fmtDate = (s) => s.split('-').reverse().join('/');
  const monthKey = (dateStr) => dateStr.slice(0, 7); // yyyy-mm
  const MONTH_NAMES = ['Jan','Fev','Mar','Abr','Mai','Jun','Jul','Ago','Set','Out','Nov','Dez'];

  const startOfWeek = () => {
    const d = new Date(); d.setHours(0,0,0,0);
    const day = d.getDay();
    const diff = (day === 0 ? -6 : 1) - day;
    d.setDate(d.getDate() + diff);
    return toDateInput(d);
  };
  const isSameMonth = (dateStr) => {
    const d = new Date(dateStr + 'T00:00:00');
    const t = new Date();
    return d.getMonth() === t.getMonth() && d.getFullYear() === t.getFullYear();
  };
  const isFromWeek = (dateStr) => dateStr >= startOfWeek();

  // Calcula o valor total sugerido a partir da duração: cada bloco de 30 dias
  // conta como 1 período, multiplicado pelo valor padrão da forma de pagamento.
  const suggestedPrice = (duration, pagamento) => {
    const periods = Math.max(1, Math.round((Number(duration) || DEFAULT_DURATION) / DEFAULT_DURATION));
    const unit = pagamento === 'pix' ? DEFAULT_PIX_PRICE : DEFAULT_PRICE;
    const total = periods * unit;
    return pagamento === 'pix' ? Math.round(total * 100) / 100 : total;
  };

  // Um slot de 90 dias pago de uma vez vira 3 períodos, cada um com 1/3 do valor,
  // datados a cada 30 dias a partir da entrada — assim a receita é contabilizada
  // no mês certo, mesmo quando o pagamento foi feito de uma vez só.
  const playerPeriods = (p) => {
    const duration = Number(p.duration) || DEFAULT_DURATION;
    const periods = Math.max(1, Math.round(duration / DEFAULT_DURATION));
    const perValue = (Number(p.price) || 0) / periods;
    const list = [];
    for (let i = 0; i < periods; i++) {
      list.push({ date: addDays(p.entry, i * DEFAULT_DURATION), value: perValue });
    }
    return list;
  };

  const STATUS_META = {
    active:  { label: 'Ativo',    color: '#6FD1C5', bg: 'rgba(111,209,197,0.10)', border: 'rgba(111,209,197,0.3)' },
    soon:    { label: 'Vencendo', color: '#7FB8E8', bg: 'rgba(127,184,232,0.12)', border: 'rgba(127,184,232,0.4)' },
    expired: { label: 'Vencido',  color: '#8A93A6', bg: 'rgba(138,147,166,0.10)', border: 'rgba(138,147,166,0.35)' },
  };

  let players = [];
  let config = { maxSlots: 0 };
  let currentTab = 'active';
  let statusFilter = null; // null | 'active' | 'soon' | 'expired'
  let paymentFilter = null; // null | 'gold' | 'pix'
  let searchQuery = '';
  let editingId = null;
  let notifPermission = (typeof Notification !== 'undefined') ? Notification.permission : 'unsupported';
  let sentLog = JSON.parse(localStorage.getItem('ancestrais-notif-log') || '{}');

  const appEl = document.getElementById('app');

  

  function generatePDF() {
    const { jsPDF } = window.jspdf;
    const docPdf = new jsPDF();
    const sorted = [...players].filter(p => !p.archived).sort((a,b) => new Date(a.exit) - new Date(b.exit));
    const today = new Date().toLocaleDateString('pt-BR');

    docPdf.setFontSize(16);
    docPdf.text('Ancestrais — Relatório de Slots', 14, 18);
    docPdf.setFontSize(10);
    docPdf.setTextColor(120);
    docPdf.text('Gerado em ' + today + ' · ordenado do slot que vence primeiro para o que vence por último', 14, 24);

    let y = 36;
    docPdf.setFontSize(8);
    docPdf.setTextColor(0);
    docPdf.setFont(undefined, 'bold');
    docPdf.text('Jogador', 14, y);
    docPdf.text('Entrada', 66, y);
    docPdf.text('Saída', 90, y);
    docPdf.text('Status', 114, y);
    docPdf.text('Pagto', 136, y);
    docPdf.text('Valor total', 154, y);
    docPdf.text('Valor/mês', 178, y);
    docPdf.setFont(undefined, 'normal');
    y += 4;
    docPdf.setDrawColor(200);
    docPdf.line(14, y, 196, y);
    y += 6;

    let footGold = 0, footPix = 0;
    sorted.forEach(p => {
      if (y > 270) { docPdf.addPage(); y = 20; }
      const st = statusOf(p.exit);
      const periods = playerPeriods(p);
      const perMonth = periods.length ? periods[0].value : (Number(p.price)||0);
      const fmt = isPix(p) ? fmtBRL : fmtGold;
      if (isPix(p)) footPix += (Number(p.price)||0); else footGold += (Number(p.price)||0);
      docPdf.text(String(p.name).slice(0, 20), 14, y);
      docPdf.text(fmtDate(p.entry), 66, y);
      docPdf.text(fmtDate(p.exit), 90, y);
      docPdf.text(STATUS_META[st].label, 114, y);
      docPdf.text(isPix(p) ? 'Pix' : 'Gold', 136, y);
      docPdf.text(fmt(p.price), 154, y);
      docPdf.text(fmt(perMonth) + (periods.length > 1 ? ` (${periods.length}x)` : ''), 178, y);
      y += 7;
    });

    if (sorted.length === 0) {
      docPdf.text('Nenhum jogador cadastrado.', 14, y);
    } else {
      y += 4;
      docPdf.setDrawColor(200);
      docPdf.line(14, y, 196, y);
      y += 8;
      docPdf.setFont(undefined, 'bold');
      docPdf.text(`Total Gold (slots ativos): ${fmtGold(footGold)}`, 14, y);
      y += 7;
      docPdf.text(`Total Pix (slots ativos): ${fmtBRL(footPix)}`, 14, y);
      docPdf.setFont(undefined, 'normal');
    }

    docPdf.save(`ancestrais-slots-${toDateInput(new Date())}.pdf`);
  }

  function buildChart(type) {
    const months = [];
    const now = new Date();
    for (let i = 5; i >= 0; i--) {
      const d = new Date(now.getFullYear(), now.getMonth() - i, 1);
      months.push({ key: `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`, label: `${MONTH_NAMES[d.getMonth()]}/${String(d.getFullYear()).slice(2)}` });
    }
    const sums = months.map(m => {
      const total = players.reduce((acc, p) => {
        const matchesType = type === 'pix' ? isPix(p) : !isPix(p);
        if (!matchesType) return acc;
        const periodSum = playerPeriods(p).reduce((a, per) => a + (monthKey(per.date) === m.key ? per.value : 0), 0);
        return acc + periodSum;
      }, 0);
      return { ...m, total };
    });
    const max = Math.max(...sums.map(s => s.total), 1);
    const fmt = type === 'pix' ? fmtBRL : fmtGold;
    const title = type === 'pix' ? '💳 Arrecadação em Pix por mês (R$)' : '🪙 Arrecadação em Gold por mês';
    return `
      <div class="chart-card">
        <div class="chart-title">${title}</div>
        ${sums.map(s => `
          <div class="chart-row">
            <div class="chart-month">${s.label}</div>
            <div class="chart-bar-wrap"><div class="chart-bar ${type === 'pix' ? 'chart-bar-pix' : ''}" style="width:${(s.total/max*100).toFixed(1)}%;"></div></div>
            <div class="chart-value">${fmt(s.total)}</div>
          </div>
        `).join('')}
      </div>
    `;
  }

  function render() {
    const activePlayers = players.filter(p => !p.archived);
    const historyPlayers = players.filter(p => p.archived);
    let listPlayers = currentTab === 'active' ? activePlayers : historyPlayers;
    if (currentTab === 'active' && statusFilter) {
      listPlayers = listPlayers.filter(p => statusOf(p.exit) === statusFilter);
    }
    if (paymentFilter) {
      listPlayers = listPlayers.filter(p => (paymentFilter === 'pix' ? isPix(p) : !isPix(p)));
    }
    if (searchQuery.trim()) {
      const q = searchQuery.trim().toLowerCase();
      listPlayers = listPlayers.filter(p => p.name.toLowerCase().includes(q));
    }
    const sorted = [...listPlayers].sort((a,b) => currentTab === 'active'
      ? new Date(a.exit) - new Date(b.exit)
      : new Date(b.archivedAt || b.exit) - new Date(a.archivedAt || a.exit));

    const counts = { active:0, soon:0, expired:0 };
    activePlayers.forEach(p => counts[statusOf(p.exit)]++);

    const thisMonthKey = monthKey(toDateInput(new Date()));
    const weekStart = startOfWeek();

    let totalGold = 0, totalPix = 0;
    let monthGold = 0, monthPix = 0, weekGold = 0, weekPix = 0;
    let monthPayersGold = 0, monthPayersPix = 0;
    let ativoGold = 0, ativoPix = 0;
    players.forEach(p => {
      const v = Number(p.price) || 0;
      const periods = playerPeriods(p);
      const monthValue = periods.filter(per => monthKey(per.date) === thisMonthKey).reduce((a,per) => a + per.value, 0);
      const weekValue = periods.filter(per => per.date >= weekStart).reduce((a,per) => a + per.value, 0);
      if (isPix(p)) {
        totalPix += v;
        if (monthValue > 0) { monthPix += monthValue; monthPayersPix++; }
        weekPix += weekValue;
      } else {
        totalGold += v;
        if (monthValue > 0) { monthGold += monthValue; monthPayersGold++; }
        weekGold += weekValue;
      }
    });
    activePlayers.forEach(p => {
      if (statusOf(p.exit) === 'expired') return;
      if (isPix(p)) ativoPix += (Number(p.price)||0); else ativoGold += (Number(p.price)||0);
    });
    const monthPayers = monthPayersGold + monthPayersPix;

    const alerts = activePlayers.filter(p => statusOf(p.exit) === 'expired' || statusOf(p.exit) === 'soon')
      .sort((a,b) => new Date(a.exit) - new Date(b.exit));

    const maxSlots = Number(config.maxSlots) || 0;
    const showFull = maxSlots > 0 && activePlayers.length >= Math.ceil(maxSlots * 0.8);


    appEl.innerHTML = `
      ${notifPermission === 'granted' ? `
        <div class="banner ok">🔔 Avisos ativados neste navegador</div>
      ` : notifPermission === 'unsupported' ? '' : `
        <button class="banner" id="notifBtn" style="width:100%;">🔔 Ativar avisos para slots vencendo (funciona com a página aberta)</button>
      `}

      ${showFull ? `
        <div class="banner warn">🪧 Quase cheio: ${activePlayers.length}/${maxSlots} slots preenchidos</div>
      ` : ''}

      ${alerts.length > 0 ? `
        <div class="alert-box">
          <div class="alert-title">⚠️ ${alerts.length} slot${alerts.length === 1 ? '' : 's'} vencido${alerts.length === 1 ? '' : 's'} ou vencendo</div>
          ${alerts.map(p => {
            const d = daysUntil(p.exit);
            return `<div class="alert-item">
              <span>${p.name}</span>
              <span class="d">${d < 0 ? `venceu há ${-d}d` : d === 0 ? 'vence hoje' : `vence em ${d}d`}</span>
            </div>`;
          }).join('')}
        </div>
      ` : ''}

      <div class="gold-card">
        <div style="display:flex;align-items:center;gap:10px;">
          <span style="font-size:22px;">🪙</span>
          <div>
            <div class="gold-label">Gold arrecadado (total)</div>
            <div class="gold-value">${fmtGold(totalGold)}</div>
          </div>
        </div>
        <div style="text-align:right;">
          <div class="gold-label">Ativos/vencendo</div>
          <div style="font-size:15px;font-weight:600;color:#9DC3EA;">${fmtGold(ativoGold)}</div>
        </div>
      </div>
      <div class="mini-stats mini-stats-2">
        <div class="mini-stat"><div class="num">${fmtGold(weekGold)}</div><div class="lbl">Gold na<br>semana</div></div>
        <div class="mini-stat"><div class="num">${fmtGold(monthGold)}</div><div class="lbl">Gold no<br>mês</div></div>
      </div>

      <div class="gold-card pix-card">
        <div style="display:flex;align-items:center;gap:10px;">
          <span style="font-size:22px;">💳</span>
          <div>
            <div class="gold-label">Pix arrecadado (total)</div>
            <div class="gold-value">${fmtBRL(totalPix)}</div>
          </div>
        </div>
        <div style="text-align:right;">
          <div class="gold-label">Ativos/vencendo</div>
          <div style="font-size:15px;font-weight:600;color:#9DC3EA;">${fmtBRL(ativoPix)}</div>
        </div>
      </div>
      <div class="mini-stats mini-stats-2">
        <div class="mini-stat"><div class="num">${fmtBRL(weekPix)}</div><div class="lbl">Pix na<br>semana</div></div>
        <div class="mini-stat"><div class="num">${fmtBRL(monthPix)}</div><div class="lbl">Pix no<br>mês</div></div>
      </div>

      <div class="pagantes-chip">👥 ${monthPayers} pagante${monthPayers === 1 ? '' : 's'} no mês <span>(🪙 ${monthPayersGold} · 💳 ${monthPayersPix})</span></div>

      <div class="stats">
        ${['active','soon','expired'].map(k => `
          <button class="stat clickable-stat ${statusFilter === k ? 'stat-selected' : ''}" data-status="${k}" style="background:${STATUS_META[k].bg};border-color:${STATUS_META[k].border};">
            <div class="num" style="color:${STATUS_META[k].color};">${counts[k]}</div>
            <div class="lbl">${STATUS_META[k].label}</div>
          </button>
        `).join('')}
      </div>
      ${statusFilter ? `
        <div class="filter-chip">Mostrando: ${STATUS_META[statusFilter].label} <button id="clearFilter">✕ limpar filtro</button></div>
      ` : ''}

      ${buildChart('gold')}
      ${buildChart('pix')}

      <div class="tabs">
        <button class="tab-btn ${currentTab === 'active' ? 'active' : ''}" id="tabActive">Ativos (${activePlayers.length})</button>
        <button class="tab-btn ${currentTab === 'history' ? 'active' : ''}" id="tabHistory">Histórico (${historyPlayers.length})</button>
      </div>

      <input class="field search-field" id="searchInput" placeholder="🔍 Buscar jogador por nome..." value="${searchQuery}" style="margin-top:10px;margin-bottom:0;" />

      <div class="tabs" style="margin-top:8px;">
        <button class="tab-btn pay-filter-btn ${paymentFilter === 'gold' ? 'active' : ''}" id="filterGold">🪙 Só Gold</button>
        <button class="tab-btn pay-filter-btn ${paymentFilter === 'pix' ? 'active' : ''}" id="filterPix">💳 Só Pix</button>
      </div>

      <div class="btn-row">
        <button class="add-btn" id="openForm">＋ Adicionar</button>
        <button class="pdf-btn" id="genPdf">📄 Relatório PDF</button>
      </div>

      <div class="list">
        ${sorted.length === 0 ? `<div class="empty">${currentTab === 'active' ? 'Nenhum jogador cadastrado ainda.<br>Toque em "Adicionar" para começar.' : 'Nenhum jogador no histórico ainda.'}</div>` : ''}
        ${sorted.map(p => {
          const st = statusOf(p.exit);
          const meta = STATUS_META[st];
          const d = daysUntil(p.exit);
          const icon = st === 'expired' ? '⚠️' : st === 'soon' ? '⏰' : '✅';
          return `
            <div class="card" style="border-color:${currentTab === 'active' ? meta.border : 'rgba(138,147,166,0.3)'};">
              <div class="card-top">
                <div style="flex:1;min-width:0;">
                  <div class="name-row">
                    <span class="p-name">${p.name}</span>
                    ${currentTab === 'active' ? `<span class="p-badge" style="background:${meta.bg};color:${meta.color};border-color:${meta.border};">${icon} ${meta.label}</span>` : ''}
                  </div>
                  <div class="meta-row">
                    <span>📅 Entrou ${fmtDate(p.entry)}</span>
                    <span>${isPix(p) ? `💳 ${fmtBRL(p.price)} (Pix)` : `🪙 ${fmtGold(p.price)} gold`}</span>
                  </div>
                  ${currentTab === 'active' ? `
                    <div class="exit-line" style="color:${meta.color};">
                      Sai ${fmtDate(p.exit)} ${d >= 0 ? `(em ${d} dia${d===1?'':'s'})` : `(há ${-d} dia${-d===1?'':'s'})`}
                    </div>
                  ` : `
                    <div class="exit-line" style="color:#8A93A6;">Saiu em ${fmtDate(p.exit)}${p.archivedAt ? ' · arquivado ' + fmtDate(p.archivedAt) : ''}</div>
                  `}
                  ${p.obs ? `<div class="obs-line">📝 ${p.obs}</div>` : ''}
                </div>
                <div class="card-actions">
                  ${currentTab === 'active' ? `
                    <button class="icon-btn edit-btn" data-id="${p.id}" title="Editar">✏️</button>
                    <button class="icon-btn renew-btn" data-id="${p.id}" title="Renovar">🔄</button>
                    <button class="icon-btn archive-btn" data-id="${p.id}" title="Mover para histórico">🗄️</button>
                  ` : `
                    <button class="icon-btn restore-btn" data-id="${p.id}" title="Restaurar">♻️</button>
                    <button class="icon-btn del-btn" data-id="${p.id}" title="Excluir definitivamente">🗑️</button>
                  `}
                </div>
              </div>
            </div>
          `;
        }).join('')}
      </div>

      <div class="overlay" id="overlay">
        <div class="modal">
          <div class="modal-head">
            <div class="t">${editingId ? 'Editar jogador' : 'Novo jogador'}</div>
            <button id="closeForm">✕</button>
          </div>
          <label>Nome do jogador</label>
          <input class="field" id="fName" placeholder="Ex: DragonSlayer99" />
          <label>Data de entrada</label>
          <input class="field" id="fEntry" type="date" />
          <label>Duração (dias)</label>
          <input class="field" id="fDuration" type="number" value="${DEFAULT_DURATION}" />
          <label>Forma de pagamento</label>
          <select class="field" id="fPagamento">
            <option value="gold">🪙 Gold no jogo</option>
            <option value="pix">💳 Pix</option>
          </select>
          <label id="fPriceLabel">Valor do slot (gold)</label>
          <input class="field" id="fPrice" type="number" step="0.01" value="${DEFAULT_PRICE}" />
          <label>Observações (opcional)</label>
          <textarea class="field" id="fObs" placeholder="Ex: pediu pra sair mais cedo, combinou pagamento atrasado..."></textarea>
          <div class="hint" id="fHint">Padrão: 35.000 gold / 30 dias · Pix: R$ 3,50 / 30 dias</div>
          <div class="err" id="fErr" style="display:none;"></div>
          <button class="save-btn" id="fSave">${editingId ? 'Salvar alterações' : 'Salvar jogador'}</button>
        </div>
      </div>

      <div class="overlay" id="configOverlay">
        <div class="modal">
          <div class="modal-head">
            <div class="t">Configurações</div>
            <button id="closeConfig">✕</button>
          </div>
          <label>Número máximo de slots da guilda (0 = sem limite / sem aviso)</label>
          <input class="field" id="fMaxSlots" type="number" value="${config.maxSlots || 0}" />
          <label>Avisar quando faltar quantos dias para o slot vencer</label>
          <input class="field" id="fAlertDays" type="number" min="1" value="${config.alertDays || 5}" />
          <button class="save-btn" id="saveConfig">Salvar configuração</button>
        </div>
      </div>
    `;

    // form fill for edit mode
    const editingPlayer = editingId ? players.find(p => p.id === editingId) : null;
    document.getElementById('fName').value = editingPlayer ? editingPlayer.name : '';
    document.getElementById('fEntry').value = editingPlayer ? editingPlayer.entry : toDateInput(new Date());
    document.getElementById('fDuration').value = editingPlayer ? editingPlayer.duration : DEFAULT_DURATION;
    document.getElementById('fPagamento').value = editingPlayer ? (editingPlayer.pagamento || 'gold') : 'gold';
    document.getElementById('fPrice').value = editingPlayer
      ? editingPlayer.price
      : suggestedPrice(DEFAULT_DURATION, document.getElementById('fPagamento').value);
    document.getElementById('fPriceLabel').textContent = document.getElementById('fPagamento').value === 'pix' ? 'Valor do slot (R$)' : 'Valor do slot (gold)';
    document.getElementById('fObs').value = editingPlayer ? (editingPlayer.obs || '') : '';

    document.getElementById('fPagamento').onchange = (e) => {
      const label = document.getElementById('fPriceLabel');
      const priceInput = document.getElementById('fPrice');
      const duration = document.getElementById('fDuration').value;
      label.textContent = e.target.value === 'pix' ? 'Valor do slot (R$)' : 'Valor do slot (gold)';
      priceInput.value = suggestedPrice(duration, e.target.value);
      upd();
    };

    document.getElementById('openForm').onclick = () => { editingId = null; render(); document.getElementById('overlay').classList.add('open'); };
    document.getElementById('closeForm').onclick = () => { document.getElementById('overlay').classList.remove('open'); editingId = null; };
    document.getElementById('overlay').onclick = (e) => { if (e.target.id === 'overlay') { e.currentTarget.classList.remove('open'); editingId = null; } };
    document.getElementById('genPdf').onclick = generatePDF;

    document.getElementById('tabActive').onclick = () => { currentTab = 'active'; render(); };
    document.getElementById('tabHistory').onclick = () => { currentTab = 'history'; statusFilter = null; render(); };

    document.querySelectorAll('.clickable-stat').forEach(btn => {
      btn.onclick = () => {
        const s = btn.dataset.status;
        currentTab = 'active';
        statusFilter = (statusFilter === s) ? null : s;
        render();
      };
    });
    const clearBtn = document.getElementById('clearFilter');
    if (clearBtn) clearBtn.onclick = () => { statusFilter = null; render(); };

    const searchInput = document.getElementById('searchInput');
    searchInput.oninput = (e) => {
      const cursorPos = e.target.selectionStart;
      searchQuery = e.target.value;
      render();
      const newInput = document.getElementById('searchInput');
      newInput.focus();
      newInput.setSelectionRange(cursorPos, cursorPos);
    };

    document.getElementById('filterGold').onclick = () => {
      paymentFilter = (paymentFilter === 'gold') ? null : 'gold';
      render();
    };
    document.getElementById('filterPix').onclick = () => {
      paymentFilter = (paymentFilter === 'pix') ? null : 'pix';
      render();
    };

    document.getElementById('openConfig').onclick = () => document.getElementById('configOverlay').classList.add('open');
    document.getElementById('closeConfig').onclick = () => document.getElementById('configOverlay').classList.remove('open');
    document.getElementById('configOverlay').onclick = (e) => { if (e.target.id === 'configOverlay') e.currentTarget.classList.remove('open'); };
    document.getElementById('saveConfig').onclick = async () => {
      const maxSlots = Number(document.getElementById('fMaxSlots').value) || 0;
      const alertDaysValue = Math.max(1, Number(document.getElementById('fAlertDays').value) || 5);
      try {
        await setDoc(configRef, { maxSlots, alertDays: alertDaysValue }, { merge: true });
        document.getElementById('configOverlay').classList.remove('open');
      } catch (e) { alert('Erro ao salvar configuração: ' + e.message); }
    };

    const upd = () => {
      const entry = document.getElementById('fEntry').value;
      const dur = document.getElementById('fDuration').value;
      const periods = Math.max(1, Math.round((Number(dur) || DEFAULT_DURATION) / DEFAULT_DURATION));
      document.getElementById('fHint').textContent = entry && dur
        ? `Saída prevista: ${fmtDate(addDays(entry, dur))} · ${periods} período${periods===1?'':'s'} de 30 dias · Valor calculado automaticamente`
        : `${periods} período${periods===1?'':'s'} de 30 dias · Valor calculado automaticamente`;
    };
    document.getElementById('fEntry').oninput = upd;
    document.getElementById('fDuration').oninput = (e) => {
      const pagamento = document.getElementById('fPagamento').value;
      document.getElementById('fPrice').value = suggestedPrice(e.target.value, pagamento);
      upd();
    };
    upd();

    document.getElementById('fSave').onclick = async () => {
      const name = document.getElementById('fName').value.trim();
      const entry = document.getElementById('fEntry').value;
      const duration = Number(document.getElementById('fDuration').value);
      const price = Number(document.getElementById('fPrice').value);
      const pagamento = document.getElementById('fPagamento').value;
      const obs = document.getElementById('fObs').value.trim();
      const errEl = document.getElementById('fErr');
      if (!name) { errEl.textContent = 'Digite o nome do jogador.'; errEl.style.display = 'block'; return; }
      if (!entry) { errEl.textContent = 'Escolha a data de entrada.'; errEl.style.display = 'block'; return; }
      if (!duration || duration <= 0) { errEl.textContent = 'A duração precisa ser maior que zero.'; errEl.style.display = 'block'; return; }
      if (isNaN(price) || price < 0) { errEl.textContent = 'Valor do slot inválido.'; errEl.style.display = 'block'; return; }
      const exit = addDays(entry, duration);
      try {
        if (editingId) {
          await updateDoc(doc(db, 'players', editingId), { name, entry, duration, exit, price, pagamento, obs });
        } else {
          await addDoc(playersCol, { name, entry, duration, exit, price, pagamento, obs, archived: false });
        }
        document.getElementById('overlay').classList.remove('open');
        editingId = null;
      } catch (e) {
        errEl.textContent = 'Erro ao salvar no banco de dados: ' + e.message;
        errEl.style.display = 'block';
      }
    };

    document.querySelectorAll('.edit-btn').forEach(btn => {
      btn.onclick = () => { editingId = btn.dataset.id; render(); document.getElementById('overlay').classList.add('open'); };
    });

    document.querySelectorAll('.renew-btn').forEach(btn => {
      btn.onclick = async () => {
        const p = players.find(x => x.id === btn.dataset.id);
        if (!p) return;
        const newExit = addDays(p.exit, p.duration || DEFAULT_DURATION);
        try { await updateDoc(doc(db, 'players', p.id), { exit: newExit }); }
        catch (e) { alert('Erro ao renovar: ' + e.message); }
      };
    });

    document.querySelectorAll('.archive-btn').forEach(btn => {
      btn.onclick = async () => {
        try { await updateDoc(doc(db, 'players', btn.dataset.id), { archived: true, archivedAt: toDateInput(new Date()) }); }
        catch (e) { alert('Erro ao arquivar: ' + e.message); }
      };
    });

    document.querySelectorAll('.restore-btn').forEach(btn => {
      btn.onclick = async () => {
        try { await updateDoc(doc(db, 'players', btn.dataset.id), { archived: false }); }
        catch (e) { alert('Erro ao restaurar: ' + e.message); }
      };
    });

    document.querySelectorAll('.del-btn').forEach(btn => {
      btn.onclick = async () => {
        if (!confirm('Excluir este jogador definitivamente? Essa ação não pode ser desfeita.')) return;
        try { await deleteDoc(doc(db, 'players', btn.dataset.id)); }
        catch (e) { alert('Erro ao remover: ' + e.message); }
      };
    });

    const notifBtn = document.getElementById('notifBtn');
    if (notifBtn) {
      notifBtn.onclick = async () => {
        const perm = await Notification.requestPermission();
        notifPermission = perm;
        render();
      };
    }
  }

  function checkNotify() {
    if (notifPermission !== 'granted') return;
    const today = toDateInput(new Date());
    let changed = false;
    players.filter(p => !p.archived).forEach(p => {
      const st = statusOf(p.exit);
      if (st === 'soon' || st === 'expired') {
        const key = `${p.id}-${today}`;
        if (!sentLog[key]) {
          new Notification('Ancestrais — slot ' + (st === 'expired' ? 'vencido' : 'vencendo'), {
            body: `${p.name} — saída prevista em ${fmtDate(p.exit)}`
          });
          sentLog[key] = true;
          changed = true;
        }
      }
    });
    if (changed) localStorage.setItem('ancestrais-notif-log', JSON.stringify(sentLog));
  }

  onSnapshot(playersCol, (snap) => {
    players = snap.docs.map(d => ({ id: d.id, ...d.data() }));
    render();
    checkNotify();
  }, (error) => {
    appEl.innerHTML = `<div class="loading" style="color:#E8929A;">Erro ao conectar ao Firebase: ${error.message}<br><br>Verifique se você colou a firebaseConfig corretamente no código.</div>`;
  });

  onSnapshot(configRef, (snap) => {
    config = snap.exists() ? snap.data() : { maxSlots: 0 };
    alertDays = Number(config.alertDays) || 5;
    render();
    checkNotify();
  });
</script>
</body>
</html>
